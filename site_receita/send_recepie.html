<!-- div para criação do formulariio de 5 campos-->
<div class="container3">
<h1>Envie sua Receita</h1>

<form id="form-receita">
    <label for="nome">Nome do usuário</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required>

    <label for="receita">Nome da receita</label>
    <input type="text" id="receita" name="receita" required>

    <label for="ingredientes">Ingredientes</label>
    <textarea id="ingredientes" name="ingredientes" required></textarea>

    <label for="preparo">Modo de preparo</label>
    <textarea id="preparo" name="preparo" required></textarea>

    <button type="submit" class="botao">Enviar</button>
</form>
